name: X 投稿実行(外部cron経由のworkflow_dispatch)

# F8: 外部cronサービス(cron-job.org 等)から GitHub Actions REST API 経由で
# workflow_dispatch を叩くことを「主経路」として想定したワークフロー。
# 実行内容は `npm run post -- --auto-slot`(本番投稿)相当。
# 手動実行時は mode=dryrun を選べば実際にXへは投稿せず動作確認だけできる。
#
# 外部cron側の設定手順(叩くURL・認証ヘッダ・ボディ・時刻)は docs/cron-setup.md を参照。

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "投稿枠。auto=起動時刻(JST)から自動判定、または morning/noon/evening を明示指定"
        type: choice
        required: false
        default: "auto"
        options:
          - auto
          - morning
          - noon
          - evening
      mode:
        description: "post=実際にXへ投稿する / dryrun=投稿せず動作確認のみ(手動テスト用)"
        type: choice
        required: false
        default: "post"
        options:
          - post
          - dryrun

  # バックアップ用途のみ(主経路ではない)。
  # GitHub Actionsのscheduleトリガーは実行遅延・不発が起こりうるため、通常運用は
  # cron-job.org 等の外部無料サービスから上記 workflow_dispatch を定時に叩く方式を主経路とする
  # (docs/cron-setup.md参照)。このscheduleは、外部cron側が何らかの理由で不発だった場合の保険として、
  # 同じ3枠のおおよその時刻の少し後に本番投稿(auto-slot判定)を追加で試みるだけのもの。
  # 冪等性チェック(1枠1日1投稿、src/postHistory.ts)により、外部cron経由で既に投稿済みであれば
  # ここでの実行は何も送信せず安全にスキップされる(二重投稿にはならない)。
  schedule:
    - cron: "35 22 * * *" # 朝枠(07:30 JST)の少し後 = UTC前日22:35。バックアップ用。
    - cron: "20 3 * * *" # 昼枠(12:15 JST)の少し後 = UTC03:20。バックアップ用。
    - cron: "5 12 * * *" # 夜枠(21:00 JST)の少し後 = UTC12:05。バックアップ用。

permissions:
  contents: write

jobs:
  run-posting-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 履歴コミットステップの `git pull --rebase` が並行実行時にも
          # リモートの新しいコミットを正しく取り込めるよう、シャロークローンにしない。

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run posting pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          POST_RECOVERY_WINDOW_HOURS: ${{ secrets.POST_RECOVERY_WINDOW_HOURS }}
          # F12(挙動系設定、任意): 未設定ならコード側の既定値を使う
          POST_SLOT_MORNING_TIME: ${{ secrets.POST_SLOT_MORNING_TIME }}
          POST_SLOT_NOON_TIME: ${{ secrets.POST_SLOT_NOON_TIME }}
          POST_SLOT_EVENING_TIME: ${{ secrets.POST_SLOT_EVENING_TIME }}
          POST_LANGUAGE: ${{ secrets.POST_LANGUAGE }}
          POST_TONE: ${{ secrets.POST_TONE }}
          POST_MAX_BODY_TWEETS: ${{ secrets.POST_MAX_BODY_TWEETS }}
          POST_LINK_TWEET_ENABLED: ${{ secrets.POST_LINK_TWEET_ENABLED }}
          POST_LINK_TWEET_POSITION: ${{ secrets.POST_LINK_TWEET_POSITION }}
          # F10(任意): 投稿失敗・スキップ時の追加通知先(Slack incoming webhook等)
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          # workflow_dispatch の inputs は type: choice で選択肢を制限しているが、
          # この制限は GitHub Web UI の「Run workflow」フォームでのみ強制され、
          # REST API(docs/cron-setup.md が案内する外部cron連携の呼び出し経路)経由では
          # 任意の文字列を送信できてしまう。${{ }} をrun:に直接埋め込むとテンプレート展開が
          # シェル実行前に行われ、スクリプトインジェクションの原因になるため、
          # 必ずenv:経由の環境変数として受け渡し、シェル側でcase文により許可リスト検証する。
          SLOT_INPUT: ${{ inputs.slot }}
          MODE_INPUT: ${{ inputs.mode }}
        run: |
          set -e
          SLOT="${SLOT_INPUT:-auto}"
          MODE="${MODE_INPUT:-post}"

          case "$SLOT" in
            auto|morning|noon|evening) ;;
            *)
              echo "invalid slot input: $SLOT" >&2
              exit 1
              ;;
          esac

          case "$MODE" in
            post|dryrun) ;;
            *)
              echo "invalid mode input: $MODE" >&2
              exit 1
              ;;
          esac

          NPM_SCRIPT="post"
          if [ "$MODE" = "dryrun" ]; then
            NPM_SCRIPT="dryrun"
          fi
          echo "slot=$SLOT mode=$MODE npmScript=$NPM_SCRIPT"
          if [ "$SLOT" = "auto" ]; then
            npm run "$NPM_SCRIPT" -- --auto-slot
          else
            npm run "$NPM_SCRIPT" -- --slot="$SLOT"
          fi

      # F10: 実行結果(成功/失敗/スキップ)をGitHub Actionsのジョブサマリーに残す。
      # 投稿処理が失敗・スキップした場合でも(!cancelled())必ず実行し、利用者がActionsの実行一覧
      # から結果に気づけるようにする(実行基盤のログによる通知)。
      - name: Write job summary
        if: ${{ !cancelled() }}
        env:
          MODE_INPUT: ${{ inputs.mode }}
        run: |
          set -e
          MODE="${MODE_INPUT:-post}"
          RESULT_FILE="data/output/latest-publish.json"
          if [ "$MODE" = "dryrun" ]; then
            RESULT_FILE="data/output/latest-dryrun.json"
          fi
          RESULT_FILE="$RESULT_FILE" MODE="$MODE" node -e "
            const fs = require('fs');
            const file = process.env.RESULT_FILE;
            let summary = '## X投稿パイプライン実行結果\n\n';
            try {
              const data = JSON.parse(fs.readFileSync(file, 'utf-8'));
              summary += '- 実行日時: ' + (data.ranAt ?? '不明') + '\n';
              summary += '- モード: ' + process.env.MODE + '\n';
              summary += '- 成功: ' + data.success + '\n';
              if (data.stage) summary += '- 停止段階: ' + data.stage + '\n';
              if (data.skipReason) summary += '- スキップ理由: ' + data.skipReason + '\n';
              if (data.error) summary += '- エラー: ' + data.error + '\n';
              if (data.candidate) summary += '- 選定記事: ' + data.candidate.title + ' (' + data.candidate.url + ')\n';
              if (data.publishResult) {
                summary += '- 投稿結果: ' + (data.publishResult.posted ? '成功' : '未投稿/失敗') + '\n';
                summary += '- 詳細: ' + data.publishResult.detail + '\n';
              }
            } catch (e) {
              summary += '結果ファイル(' + file + ')の読み込みに失敗しました: ' + e.message + '\n';
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          "

      # F8/F9: 投稿履歴(data/history/post-history.json)はGitHub Actionsの実行ごとに使い捨てられる
      # チェックアウトの中でしか更新されないため、コミット・プッシュしてリポジトリへ永続化しない限り、
      # 次回実行(次のGitHub Actions呼び出し)が冪等性判定(同一枠・同一日の二重投稿防止)を行えない。
      # そのためこのステップは、投稿処理が途中で失敗した場合(!cancelled())でも実行し、
      # 「選定はしたが投稿できなかった」履歴だけでも必ず保存する。
      - name: Commit updated post history
        if: ${{ !cancelled() }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history/post-history.json
          if git diff --cached --quiet; then
            echo "no history changes to commit"
          else
            git commit -m "chore: update post history [skip ci]"
            # 手動workflow_dispatchとバックアップのscheduleトリガーが同時に走った場合など、
            # 並行実行でリモートが進んでいると push 前の rebase が失敗しうる。
            # その場合は fetch し直して最大3回までリトライする(それでも失敗したらジョブを失敗させる)。
            attempt=1
            max_attempts=3
            until git pull --rebase && git push; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "rebase/push failed after ${max_attempts} attempts" >&2
                exit 1
              fi
              echo "rebase/push failed (attempt ${attempt}/${max_attempts}), retrying after fetch..."
              git fetch origin
              attempt=$((attempt + 1))
            done
          fi
