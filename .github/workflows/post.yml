name: X 投稿実行(外部cron経由のworkflow_dispatch)

# F8: 外部cronサービス(cron-job.org 等)から GitHub Actions REST API 経由で
# workflow_dispatch を叩くことを「主経路」として想定したワークフロー。
# 実行内容は `npm run post -- --auto-slot`(本番投稿)相当。
# 手動実行時は mode=dryrun を選べば実際にXへは投稿せず動作確認だけできる。
#
# 外部cron側の設定手順(叩くURL・認証ヘッダ・ボディ・時刻)は docs/cron-setup.md を参照。

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "投稿枠。auto=起動時刻(JST)から自動判定、または morning/noon/evening を明示指定"
        type: choice
        required: false
        default: "auto"
        options:
          - auto
          - morning
          - noon
          - evening
      mode:
        description: "post=実際にXへ投稿する / dryrun=投稿せず動作確認のみ(手動テスト用)"
        type: choice
        required: false
        default: "post"
        options:
          - post
          - dryrun

  # バックアップ用途のみ(主経路ではない)。
  # GitHub Actionsのscheduleトリガーは実行遅延・不発が起こりうるため、通常運用は
  # cron-job.org 等の外部無料サービスから上記 workflow_dispatch を定時に叩く方式を主経路とする
  # (docs/cron-setup.md参照)。このscheduleは、外部cron側が何らかの理由で不発だった場合の保険として、
  # 同じ3枠のおおよその時刻の少し後に本番投稿(auto-slot判定)を追加で試みるだけのもの。
  # 冪等性チェック(1枠1日1投稿、src/postHistory.ts)により、外部cron経由で既に投稿済みであれば
  # ここでの実行は何も送信せず安全にスキップされる(二重投稿にはならない)。
  schedule:
    - cron: "35 22 * * *" # 朝枠(07:30 JST)の少し後 = UTC前日22:35。バックアップ用。
    - cron: "20 3 * * *" # 昼枠(12:15 JST)の少し後 = UTC03:20。バックアップ用。
    - cron: "5 12 * * *" # 夜枠(21:00 JST)の少し後 = UTC12:05。バックアップ用。

permissions:
  contents: write

jobs:
  run-posting-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 履歴コミットステップの `git pull --rebase` が並行実行時にも
          # リモートの新しいコミットを正しく取り込めるよう、シャロークローンにしない。

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run posting pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          POST_RECOVERY_WINDOW_HOURS: ${{ secrets.POST_RECOVERY_WINDOW_HOURS }}
          # workflow_dispatch の inputs は type: choice で選択肢を制限しているが、
          # この制限は GitHub Web UI の「Run workflow」フォームでのみ強制され、
          # REST API(docs/cron-setup.md が案内する外部cron連携の呼び出し経路)経由では
          # 任意の文字列を送信できてしまう。${{ }} をrun:に直接埋め込むとテンプレート展開が
          # シェル実行前に行われ、スクリプトインジェクションの原因になるため、
          # 必ずenv:経由の環境変数として受け渡し、シェル側でcase文により許可リスト検証する。
          SLOT_INPUT: ${{ inputs.slot }}
          MODE_INPUT: ${{ inputs.mode }}
        run: |
          set -e
          SLOT="${SLOT_INPUT:-auto}"
          MODE="${MODE_INPUT:-post}"

          case "$SLOT" in
            auto|morning|noon|evening) ;;
            *)
              echo "invalid slot input: $SLOT" >&2
              exit 1
              ;;
          esac

          case "$MODE" in
            post|dryrun) ;;
            *)
              echo "invalid mode input: $MODE" >&2
              exit 1
              ;;
          esac

          NPM_SCRIPT="post"
          if [ "$MODE" = "dryrun" ]; then
            NPM_SCRIPT="dryrun"
          fi
          echo "slot=$SLOT mode=$MODE npmScript=$NPM_SCRIPT"
          if [ "$SLOT" = "auto" ]; then
            npm run "$NPM_SCRIPT" -- --auto-slot
          else
            npm run "$NPM_SCRIPT" -- --slot="$SLOT"
          fi

      # F8/F9: 投稿履歴(data/history/post-history.json)はGitHub Actionsの実行ごとに使い捨てられる
      # チェックアウトの中でしか更新されないため、コミット・プッシュしてリポジトリへ永続化しない限り、
      # 次回実行(次のGitHub Actions呼び出し)が冪等性判定(同一枠・同一日の二重投稿防止)を行えない。
      # そのためこのステップは、投稿処理が途中で失敗した場合(!cancelled())でも実行し、
      # 「選定はしたが投稿できなかった」履歴だけでも必ず保存する。
      - name: Commit updated post history
        if: ${{ !cancelled() }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history/post-history.json
          if git diff --cached --quiet; then
            echo "no history changes to commit"
          else
            git commit -m "chore: update post history [skip ci]"
            # 手動workflow_dispatchとバックアップのscheduleトリガーが同時に走った場合など、
            # 並行実行でリモートが進んでいると push 前の rebase が失敗しうる。
            # その場合は fetch し直して最大3回までリトライする(それでも失敗したらジョブを失敗させる)。
            attempt=1
            max_attempts=3
            until git pull --rebase && git push; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "rebase/push failed after ${max_attempts} attempts" >&2
                exit 1
              fi
              echo "rebase/push failed (attempt ${attempt}/${max_attempts}), retrying after fetch..."
              git fetch origin
              attempt=$((attempt + 1))
            done
          fi
