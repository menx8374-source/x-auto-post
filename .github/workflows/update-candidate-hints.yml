name: アフィリエイト候補ヒント更新(手動実行専用)

# アフィリエイト商品の「おすすめ候補」参考情報(最近話題のAI関連ニュース・トピック一覧、
# 読み取り専用のヒント)を生成し直すワークフロー。src/generateCandidateHints.tsが
# 既存の src/collectNews.ts の collectAndScoreNews() を読み取り専用で呼び出すだけで、
# 既存の本番投稿パイプライン(post.yml/post-affiliate.yml、src/pipeline.ts等)には
# 一切触れない・importもしない完全に独立した処理。
#
# workflow_dispatchのみ(inputなし)。定期実行(schedule)は持たない
# (admin/管理ページからユーザーが必要なタイミングで手動実行する想定)。

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-candidate-hints:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 履歴コミットステップの `git pull --rebase` が並行実行時にも
          # リモートの新しいコミットを正しく取り込めるよう、シャロークローンにしない。

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate candidate hints
        run: npm run generate:candidate-hints

      # data/affiliate-candidate-hints.json はこのワークフロー実行のたびに更新される
      # 参考情報ファイル。GitHub Actionsのチェックアウトは実行ごとに使い捨てのため、
      # コミット・プッシュしてリポジトリへ永続化しない限り、admin管理ページ(GitHub Contents API
      # 経由で読み取る)から最新の内容を参照できない(post-affiliate.ymlの履歴コミットと同じ理由)。
      - name: Commit updated candidate hints
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/affiliate-candidate-hints.json
          if git diff --cached --quiet; then
            echo "no candidate hints changes to commit"
          else
            git commit -m "chore: update affiliate candidate hints [skip ci]"
            attempt=1
            max_attempts=3
            until git pull --rebase && git push; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "rebase/push failed after ${max_attempts} attempts" >&2
                exit 1
              fi
              echo "rebase/push failed (attempt ${attempt}/${max_attempts}), retrying after fetch..."
              git fetch origin
              attempt=$((attempt + 1))
            done
          fi
